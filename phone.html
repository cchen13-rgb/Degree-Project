<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
/* ── State ───────────────────────────────────────────────── */
const socket = io('https://degree-project-r25d.onrender.com', {
  transports: ['polling'],
  reconnection: true,
  reconnectionAttempts: Infinity,
  reconnectionDelay: 1000
});

let roomCode = null;
let penColor = '#3d0d14';
let penSize  = 3;
let drawing  = false;
let dlx = 0, dly = 0;
let tpActive = false;
let tpLX = 0, tpLY = 0;
let hasDrawn = false;

/* ── Screen helpers ──────────────────────────────────────── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.toggle('hidden', s.id !== id);
  });
}

/* ── Join ────────────────────────────────────────────────── */
document.getElementById('joinBtn').addEventListener('click', doJoin);

function doJoin() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  if (code.length < 6) return;
  socket.emit('phone:join', { code });
}

socket.on('room:joined', ({ code }) => {
  roomCode = code;
  document.getElementById('drawRoomCode').textContent = code;
  document.getElementById('remoteRoomCode').textContent = code;
  showScreen('drawScreen');
});

socket.on('room:error', msg => alert(msg));

/* ── Canvas ──────────────────────────────────────────────── */
const canvas = document.getElementById('drawCanvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  const rect = canvas.parentElement;
  const dpr  = window.devicePixelRatio || 1;

  canvas.width  = rect.clientWidth  * dpr;
  canvas.height = rect.clientHeight * dpr;
  canvas.style.width  = rect.clientWidth + 'px';
  canvas.style.height = rect.clientHeight + 'px';

  ctx.scale(dpr, dpr);
  ctx.lineCap = 'round';
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return [t.clientX - r.left, t.clientY - r.top];
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  drawing = true;
  [dlx, dly] = getPos(e);
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!drawing) return;

  const [x, y] = getPos(e);

  ctx.strokeStyle = penColor;
  ctx.lineWidth   = penSize;

  ctx.beginPath();
  ctx.moveTo(dlx, dly);
  ctx.lineTo(x, y);
  ctx.stroke();

  dlx = x;
  dly = y;
});

canvas.addEventListener('touchend', () => drawing = false);

/* ── Cursor Upload ───────────────────────────────────────── */
document.getElementById('useCursorBtn').addEventListener('click', () => {
  const dataUrl = canvas.toDataURL('image/png');
  socket.emit('cursor:upload', { dataUrl });
  showScreen('remoteScreen');
});

/* ── Trackpad ────────────────────────────────────────────── */
const trackpad = document.getElementById('trackpad');

function getTP(e) {
  const r = trackpad.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return [t.clientX - r.left, t.clientY - r.top];
}

trackpad.addEventListener('touchstart', e => {
  tpActive = true;
  [tpLX, tpLY] = getTP(e);
});

trackpad.addEventListener('touchmove', e => {
  if (!tpActive) return;

  const [x, y] = getTP(e);

  const dx = (x - tpLX) * 2.8;
  const dy = (y - tpLY) * 2.8;

  tpLX = x;
  tpLY = y;

  socket.emit('cursor:move', { dx, dy });
});

trackpad.addEventListener('touchend', () => tpActive = false);

/* ── Click ───────────────────────────────────────────────── */
document.getElementById('clickBtn').addEventListener('click', () => {
  socket.emit('cursor:click');
});

/* ── NAME (FIXED) ────────────────────────────────────────── */
const nameInput = document.getElementById('nameInput');
const nameBtn   = document.getElementById('setNameBtn');

function sendName() {
  const name = nameInput.value.trim() || 'anonymous';

  if (!roomCode) {
    console.warn("⚠️ not in room yet");
    return;
  }

  console.log("📤 sending name:", name);
  socket.emit('phone:name', { name });

  nameBtn.textContent = '✓ sent';
  setTimeout(() => { nameBtn.textContent = 'Set'; }, 2000);
}

nameBtn.addEventListener('click', sendName);

nameInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendName();
});

/* ── STATUS ──────────────────────────────────────────────── */
socket.on('connect', () => {
  const s = document.getElementById('socketStatus');
  if (s) s.textContent = 'connected';
});

socket.on('disconnect', () => {
  const s = document.getElementById('socketStatus');
  if (s) s.textContent = 'reconnecting...';
});
</script>
