<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Model Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #info {
      position: absolute; top: 16px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5); font-family: sans-serif;
      font-size: 13px; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="info">drag to orbit · scroll to zoom · right-drag to pan</div>

  <!-- Three.js + addons from CDN -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
  import { RGBELoader }    from 'three/addons/loaders/RGBELoader.js';

  // ── Scene ───────────────────────────────────────────────
  const scene    = new THREE.Scene();
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);

  // ── Camera ──────────────────────────────────────────────
  const camera = new THREE.PerspectiveCamera(
    45, window.innerWidth / window.innerHeight, 0.01, 1000
  );
  camera.position.set(0, 1, 3);

  // ── Controls ────────────────────────────────────────────
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;   // smooth inertia
  controls.dampingFactor  = 0.05;
  controls.minDistance    = 0.1;
  controls.maxDistance    = 50;

  // ── Lighting ────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
  dirLight.position.set(5, 10, 7.5);
  scene.add(dirLight);

  // ── Load model ──────────────────────────────────────────
  new GLTFLoader().load(
    'model.glb',           // <-- put model.glb next to index.html
    (gltf) => {
      const model = gltf.scene;

      // Auto-center + fit camera to model bounds
      const box    = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size   = box.getSize(new THREE.Vector3());
      model.position.sub(center);  // center on origin

      const maxDim = Math.max(size.x, size.y, size.z);
      camera.position.set(0, maxDim * 0.5, maxDim * 2);
      controls.maxDistance = maxDim * 10;

      scene.add(model);

      // Play first animation if present
      if (gltf.animations.length) {
        const mixer = new THREE.AnimationMixer(model);
        mixer.clipAction(gltf.animations[0]).play();
        window._mixer = mixer;  // store for render loop
      }
    },
    (xhr) => console.log((xhr.loaded / xhr.total * 100).toFixed(0) + '% loaded'),
    (err) => console.error(err)
  );

  // ── Resize ──────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ── Render loop ─────────────────────────────────────────
  const clock = new THREE.Clock();
  (function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    if (window._mixer) window._mixer.update(delta);
    controls.update();
    renderer.render(scene, camera);
  })();
  </script>
</body>
</html>
