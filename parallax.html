<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telescope Memories</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.typekit.net/mjw2tfe.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;font-family:'EB Garamond',Georgia,serif;background:#fff;}

#sticky-wrap{
  position:sticky;top:0;width:100%;height:100vh;
  overflow:hidden;z-index:0;
}
#grain{
  position:absolute;inset:0;pointer-events:none;z-index:30;opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}
#vignette{
  position:absolute;inset:0;pointer-events:none;z-index:25;
  background:radial-gradient(ellipse at center,transparent 38%,rgba(0,0,0,0.15) 100%);
}

/* ── Frame ── */
#frame-stage{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  z-index:10;
}
#frame-border{
  position:relative;
  width:min(56vw,500px);
  aspect-ratio:4/3;
  background:#f5f0eb;
  box-shadow:
    0 0 0 8px #f5f0eb,
    0 0 0 10px #c8beb4,
    0 0 0 18px #f5f0eb,
    0 4px 48px rgba(0,0,0,0.22);
  will-change:transform;
  transition:opacity 0.6s ease;
}

#frame-border.portal{
  background:#f5f0eb;
}

#frame-image{
  position:absolute;inset:0;overflow:hidden;
  background:#e8e0d8;transition:background 0.9s ease;
}

#frame-image img.slot{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;opacity:0;transition:opacity 0.65s ease;display:block;
}
#frame-image img.slot.active{ opacity:1; }

body.portal-mode #frame-image img.slot{
  opacity:0 !important;
  transition:opacity 0.5s ease !important;
}
body.portal-mode #frame-image img.slot.active{
  opacity:0 !important;
  transition:opacity 0.5s ease !important;
}

#frame-portal-0,
#frame-portal-2{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:contain;opacity:0;z-index:6;
  transition:opacity 0.5s ease;
  display:block;
}
/* portal image opacity controlled entirely by JS */

/* ── UI ── */
#caption{
  position:absolute;bottom:58px;left:0;right:0;
  text-align:center;font-size:15px;font-style:italic;
  letter-spacing:0.07em;line-height:1.9;color:rgba(10,5,0,0);
  transition:color 0.9s ease,opacity 0.5s ease;
  pointer-events:none;z-index:20;white-space:pre-line;
}
#caption.vis{ color:rgba(10,5,0,0.72); }
.dark-ui #caption.vis{ color:rgba(255,240,230,0.82); }

#phase-label{
  position:absolute;top:22px;left:0;right:0;text-align:center;
  font-size:10px;font-style:italic;letter-spacing:0.26em;text-transform:uppercase;
  color:rgba(10,5,0,0.22);pointer-events:none;z-index:20;
  transition:color 0.5s,opacity 0.5s;
}
.dark-ui #phase-label{ color:rgba(255,240,230,0.28); }

#dots{
  position:absolute;bottom:20px;left:0;right:0;
  display:flex;justify-content:center;gap:10px;
  z-index:20;pointer-events:none;transition:opacity 0.5s;
}
.dot{
  width:4px;height:4px;border-radius:50%;
  background:rgba(10,5,0,0.18);transition:background 0.4s,transform 0.4s;
}
.dot.active{ background:rgba(10,5,0,0.65);transform:scale(1.8); }
.dark-ui .dot{ background:rgba(255,240,230,0.22); }
.dark-ui .dot.active{ background:rgba(255,240,230,0.72); }

#progress-bar{
  position:absolute;bottom:0;left:0;right:0;height:2px;
  background:rgba(10,5,0,0.07);z-index:20;pointer-events:none;
}
#progress-fill{ height:100%;width:0%;background:rgba(10,5,0,0.32); }
.dark-ui #progress-fill{ background:rgba(255,240,230,0.38); }

/* ── Layer 9 overlay ── */
#layer9-wrap{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:40;
  opacity:0;
}
#layer9-stage{
  position:relative;width:min(56vw,500px);aspect-ratio:4/3;
  overflow:hidden;
}
#layer9-0{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:contain;opacity:0;z-index:1;transition:opacity 0.7s ease;
}
#layer9-1{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:contain;z-index:2;
  opacity:1;
  transform:translateY(-110%);
  -webkit-mask-image:url('parallax/9- Layer 0.png');
  mask-image:url('parallax/9- Layer 0.png');
  -webkit-mask-size:contain;
  mask-size:contain;
  -webkit-mask-repeat:no-repeat;
  mask-repeat:no-repeat;
  -webkit-mask-position:center;
  mask-position:center;
}
#layer9-2{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:contain;opacity:0;z-index:3;transition:opacity 0.7s ease;
}



@keyframes jumpscare{
  0%   { transform:translateY(-60px); opacity:0; }
  18%  { transform:translateY(0px);   opacity:1; }
  55%  { transform:translateY(-6px);  opacity:1; }
  72%  { transform:translateY(-6px);  opacity:1; }
  84%  { transform:translateY(-160px);opacity:1; }
  94%  { transform:translateY(-340px);opacity:0.6; }
  100% { transform:translateY(-480px);opacity:0; }
}

/* ── Arched door inside frame ── */
#arch-door{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity 1.4s ease;
  z-index:12;
  cursor:pointer;
  background:#050005;
}
#arch-door.revealed{
  opacity:1;
  pointer-events:all;
}
#arch-door svg{
  width:42%;
  height:auto;
  filter:drop-shadow(0 0 18px rgba(255,255,255,0.25));
  transition:filter 0.5s ease, transform 0.5s cubic-bezier(0.16,1,0.3,1);
}
#arch-door:hover svg{
  filter:drop-shadow(0 0 38px rgba(255,255,255,0.7));
  transform:scale(1.05);
}
#glitch-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.82);
  z-index:99999;
  pointer-events:none;
  opacity:0;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:flex-start;
  padding:0;
  overflow:hidden;
  font-family:'Courier New',monospace;
  font-size:clamp(13px,1.5vw,18px);
  line-height:1.45;
  color:#8b0000;
  letter-spacing:0.04em;
  transition:opacity 0.15s ease;
}
#glitch-overlay.active{
  opacity:1;
  pointer-events:all;
}
#glitch-lines{
  width:100%;
  padding:8px 12px;
  word-break:break-all;
  white-space:pre-wrap;
  flex:1;
}
#glitch-bottom{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'fayte-pixel-hard',sans-serif;
  font-weight:400;
  font-style:normal;
  font-size:clamp(48px,10vw,130px);
  letter-spacing:0.08em;
  color:#8b0000;
  text-align:center;
  opacity:0;
  transition:opacity 0.4s ease;
  text-transform:uppercase;
  line-height:1.1;
  padding:0 5vw;
  pointer-events:none;
  z-index:100000;
  text-shadow:0 0 40px rgba(139,0,0,0.6);
}
#glitch-bottom.show{ opacity:1; }

/* flicker on the text lines */
@keyframes textFlicker{
  0%,100%{ opacity:1; }
  92%{ opacity:1; }
  93%{ opacity:0.7; }
  94%{ opacity:1; }
  97%{ opacity:0.85; }
  98%{ opacity:1; }
}
#glitch-lines{
  animation:textFlicker 0.8s infinite;
}

#scroll-driver{height:1400vh;position:relative;z-index:1;pointer-events:none;}
</style>
</head>
<body>
<div id="sticky-wrap">
  <div id="grain"></div>
  <div id="vignette"></div>
  <div id="phase-label">Memory I</div>

  <div id="frame-stage">
    <div id="frame-border">
      <div id="frame-image">
        <img id="frame-portal-0" src="parallax/9- Layer 0.png" alt="">
        <img id="frame-portal-2" src="parallax/9- Layer 2.png" alt="">
        <!-- Arched door — revealed after jumpscare sequence -->
        <div id="arch-door">
          <svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
            <path d="M10,130 L10,52 A40,44 0 0,1 90,52 L90,130 Z" fill="white"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <div id="caption"></div>
  <div id="dots"></div>
  <div id="progress-bar"><div id="progress-fill"></div></div>

  <div id="layer9-wrap">
    <div id="layer9-stage">
      <img id="layer9-0" src="parallax/9- Layer 0.png" alt="">
      <img id="layer9-1" src="parallax/9- Layer 1.png" alt="">
      <img id="layer9-2" src="parallax/9- Layer 2.png" alt="">
    </div>
  </div>
</div>

<!-- GLITCH TEXT OVERLAY -->
<div id="glitch-overlay">
  <div id="glitch-lines"></div>
  <div id="glitch-bottom">I DON'T REMEMBER!</div>
</div>

<div id="scroll-driver"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="remote-cursor.js"></script>
<script>
const N = 8;
const IMAGE_PATHS = [
  'parallax/1.png','parallax/2.png','parallax/3.PNG',
  'parallax/4.jpg','parallax/5.png','parallax/6.png',
  'parallax/7.jpg','parallax/8.jpg',
];
const CAPTIONS = [
  'Scroll Down',
  'Are things starting to come back?',
  'You kept looking for familiar faces\nin unfamiliar places.',
  "Maybe this way you can better keep hold\nof those fragments in your mind's eye.",
  "Careful though, you can't stop here.",
  'Close your eyes.',
  'Try putting out your arms,',
  'Slowly...',
];
const PHASE_NAMES = [
  'Memory I','Memory II','Memory III','Memory IV',
  'Memory V','Memory VI','Memory VII','Memory VIII',
];

/* ── Build image slots ── */
const frameImg = document.getElementById('frame-image');
const slots = IMAGE_PATHS.map((src,i)=>{
  const img=document.createElement('img');
  img.className='slot'+(i===0?' active':'');
  img.src=src; img.alt='';
  frameImg.appendChild(img);
  return img;
});

/* ── UI refs ── */
const stickyWrap  = document.getElementById('sticky-wrap');
const frameBorder = document.getElementById('frame-border');
const capEl       = document.getElementById('caption');
const phaseLbl    = document.getElementById('phase-label');
const dotsEl      = document.getElementById('dots');
const progFill    = document.getElementById('progress-fill');
const layer9Wrap  = document.getElementById('layer9-wrap');
const l9_0        = document.getElementById('layer9-0');
const l9_1        = document.getElementById('layer9-1');
const l9_2        = document.getElementById('layer9-2');
const archDoor    = document.getElementById('arch-door');
const fPortal0    = document.getElementById('frame-portal-0');
const fPortal2    = document.getElementById('frame-portal-2');
const body        = document.body;

/* ── Glitch overlay refs ── */
const glitchOverlay = document.getElementById('glitch-overlay');
const glitchLines   = document.getElementById('glitch-lines');
const glitchBottom  = document.getElementById('glitch-bottom');

/* ── Build dots ── */
const dots = Array.from({length:N},(_,i)=>{
  const d=document.createElement('div');
  d.className='dot'+(i===0?' active':'');
  dotsEl.appendChild(d); return d;
});

/* ── Caption ── */
let capShown=-1;
function showCaption(i){
  if(i===capShown)return;
  capShown=i;
  capEl.classList.remove('vis');
  phaseLbl.textContent=PHASE_NAMES[i]||'';
  setTimeout(()=>{ capEl.textContent=CAPTIONS[i]||''; capEl.classList.add('vis'); },280);
}

/* ── Hover tilt ── */
let tX=0,tY=0,tgtX=0,tgtY=0,tRaf=null;
frameBorder.addEventListener('mousemove',e=>{
  const r=frameBorder.getBoundingClientRect();
  tgtX=((e.clientY-r.top-r.height/2)/(r.height/2))*-5;
  tgtY=((e.clientX-r.left-r.width/2)/(r.width/2))*5;
  if(!tRaf) tRaf=requestAnimationFrame(tickTilt);
});
frameBorder.addEventListener('mouseleave',()=>{ tgtX=0; tgtY=0; });
function tickTilt(){
  tX+=(tgtX-tX)*0.1; tY+=(tgtY-tY)*0.1;
  frameBorder.style.transform=`perspective(900px) rotateX(${tX}deg) rotateY(${tY}deg)`;
  tRaf=(Math.abs(tgtX-tX)<0.01&&Math.abs(tgtY-tY)<0.01)?null:requestAnimationFrame(tickTilt);
}

/* ── Background ── */
function lerpBg(r,g,b){
  const s=`rgb(${r},${g},${b})`;
  stickyWrap.style.background=s; body.style.background=s;
}
function targetBg(frameP,endP){
  let r,g,b;
  if(frameP<0.5){const t=frameP/0.5;r=255;g=Math.round(255-t*20);b=Math.round(255-t*20);}
  else{const t=(frameP-0.5)/0.5;r=Math.round(255-t*75);g=Math.round(235-t*215);b=Math.round(235-t*215);}
  if(endP>0){const k=Math.min(endP*1.8,1);r=Math.round(r*(1-k));g=Math.round(g*(1-k));b=Math.round(b*(1-k));}
  return{r,g,b};
}

/* ── Scroll lock ── */
let scrollLocked = false;
let lockedScrollY = 0;

function lockScroll(){
  if(scrollLocked) return;
  scrollLocked = true;
  lockedScrollY = window.scrollY;
}
function unlockScroll(){
  if(!scrollLocked) return;
  scrollLocked = false;
}
window.addEventListener('scroll', ()=>{
  if(scrollLocked){
    window.scrollTo(0, lockedScrollY);
  }
}, {passive:false});

/* ── Glitch text sequence ── */
const QUERY = 'how many times did it happen?';
let glitchRaf = null;
let glitchRunning = false;

function startGlitchText(onComplete){
  if(glitchRunning) return;
  glitchRunning = true;
  glitchLines.textContent = '';
  glitchBottom.classList.remove('show');
  glitchOverlay.classList.add('active');

  // Fill screen with repeated text very fast
  const charsPerLine = Math.floor(window.innerWidth / (parseFloat(getComputedStyle(glitchOverlay).fontSize) * 0.6));
  const lineText = (QUERY + ' ').repeat(Math.ceil(charsPerLine / (QUERY.length + 1))).slice(0, charsPerLine);
  const linesNeeded = Math.ceil(window.innerHeight / (parseFloat(getComputedStyle(glitchOverlay).fontSize) * 1.45)) + 2;

  let linesAdded = 0;
  const lineInterval = setInterval(()=>{
    if(linesAdded >= linesNeeded){
      clearInterval(lineInterval);
      // Hold the spam text briefly, then snap it away
      setTimeout(()=>{
        // Snap clear spam text instantly
        glitchLines.textContent = '';
        // Then show "I DON'T REMEMBER!" alone on the clean screen
        setTimeout(()=>{
          glitchBottom.classList.add('show');
          // Hold, then fade overlay out
          setTimeout(()=>{
            glitchBottom.classList.remove('show');
            setTimeout(()=>{
              glitchOverlay.classList.remove('active');
              glitchRunning = false;
              if(onComplete) onComplete();
            }, 300);
          }, 1800);
        }, 150);
      }, 800);
      return;
    }
    glitchLines.textContent += lineText + '\n';
    linesAdded++;
  }, 28); // fast: ~28ms per line
}

/* ── State ── */
let activeIdx       = 0;
let layer9Showing   = false;
let layer9EverShown = false;
let jumpscaresDone  = false;
let hasReachedEnd   = false;
let jTimer          = null;

const SHOW_9 = 0.83;
const HIDE_9 = 0.72;

function cancelJumpscare(){
  if(jTimer){ clearTimeout(jTimer); jTimer=null; }
  l9_1.style.transition='none';
  l9_1.style.transform='translateY(-110%)';
  void l9_1.offsetWidth;
}

function onJumpscareEnd(){
  jumpscaresDone = true;
  body.classList.add('portal-mode');
  unlockScroll();
  l9_1.style.transition = 'transform 0.9s cubic-bezier(0.4,0,1,1)';
  l9_1.style.transform = 'translateY(-110%)';

  // Door reveal is triggered by onScroll when player scrolls back to fIdx === 0
  // Wire click handler now so it's ready
  archDoor.addEventListener('click', ()=>{
    // Fade the entire viewport to black, then navigate
    const blackout = document.createElement('div');
    blackout.style.cssText = 'position:fixed;inset:0;background:#000;opacity:0;z-index:999999;transition:opacity 0.7s ease;pointer-events:none;';
    document.body.appendChild(blackout);
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{ blackout.style.opacity = '1'; });
    });
    setTimeout(()=>{ window.location.href = 'blog.html'; }, 750);
  }, { once: true });
}

function openLayer9(firstVisit){
  layer9Showing=true;
  layer9Wrap.style.transition='opacity 0.5s ease';
  layer9Wrap.style.opacity='1';
  l9_0.style.opacity='1';
  l9_2.style.opacity='1';

  if(firstVisit && !jumpscaresDone){
    cancelJumpscare();
    // Lock scroll immediately
    lockScroll();

    // Wait for layer1 ease-in to begin (~500ms), then start glitch text
    jTimer = setTimeout(()=>{
      void l9_1.offsetWidth;
      // Ease layer1 in from top
      l9_1.style.transition = 'transform 1.2s cubic-bezier(0.16,1,0.3,1)';
      l9_1.style.transform = 'translateY(0)';

      // Start glitch text while layer1 is coming in
      setTimeout(()=>{
        startGlitchText(()=>{
          // After glitch completes: shoot layer1 upward out
          l9_1.style.transition = 'transform 0.9s cubic-bezier(0.4,0,1,1)';
          l9_1.style.transform = 'translateY(-110%)';
          setTimeout(onJumpscareEnd, 1000);
        });
      }, 400);
    }, 500);

  } else {
    l9_1.style.transition='none';
    l9_1.style.transform='translateY(-110%)';
  }
}

function closeLayer9(){
  layer9Showing=false;
  cancelJumpscare();
  layer9Wrap.style.transition='opacity 0.5s ease';
  layer9Wrap.style.opacity='0';
  setTimeout(()=>{
    if(!layer9Showing && !jumpscaresDone){
      l9_0.style.opacity='0';
      l9_2.style.opacity='0';
    }
  },300);
}

function onScroll(){
  const total     = document.body.scrollHeight-window.innerHeight;
  const raw       = Math.min(Math.max(window.scrollY/total,0),1);
  const frameFrac = 1100/1400;
  const frameP    = Math.min(raw/frameFrac,1);
  const endP      = Math.max(0,Math.min((raw-frameFrac)/(1-frameFrac),1));

  if(endP>=0.92) hasReachedEnd=true;

  progFill.style.width=(raw*100)+'%';

  const fIdx=Math.min(Math.floor(frameP*N),N-1);
  if(fIdx!==activeIdx){
    slots[activeIdx].classList.remove('active');
    slots[fIdx].classList.add('active');
    activeIdx=fIdx;
  }
  dots.forEach((d,i)=>{ d.className='dot'+(i===fIdx?' active':''); });
  showCaption(fIdx);

  // Reveal the arch door when player scrolls back to the LAST frame (index 0 = first photo) after jumpscare
  if(jumpscaresDone && fIdx === 0 && endP < 0.05){
    archDoor.classList.add('revealed');
  }

  // In portal-mode scrolled back into photo zone: show layer9 imagery in frame
  // fIdx 0 → arch door only; fIdx 1–7 → layer0 + layer2 portal images
  const inPhotoZone = jumpscaresDone && endP < 0.05;
  layer9Wrap.style.opacity = inPhotoZone ? '0' : (layer9Showing ? '1' : '0');

  if(inPhotoZone){
    if(fIdx === 0){
      // Frame 0: arch door, no portal images
      fPortal0.style.opacity = '0';
      fPortal2.style.opacity = '0';
    } else {
      // Frames 1–7: show the layer9 imagery inside the frame
      fPortal0.style.opacity = '1';
      fPortal2.style.opacity = '1';
      archDoor.classList.remove('revealed');
    }
  } else if(jumpscaresDone){
    // In end-scroll zone after jumpscare — keep portal images visible
    fPortal0.style.opacity = '1';
    fPortal2.style.opacity = '1';
  } else {
    fPortal0.style.opacity = '0';
    fPortal2.style.opacity = '0';
  }

  const inFrameZone = endP < 0.25;
  frameBorder.classList.toggle('portal', jumpscaresDone && inFrameZone);

  const bg=targetBg(frameP,endP);
  lerpBg(bg.r,bg.g,bg.b);

  const isDark=(bg.r+bg.g+bg.b)/(255*3)<0.4;
  body.classList.toggle('dark-ui',isDark);

  const uiFade  = Math.max(0,1-endP*5);
  // After jumpscare: hide frame only in the end-scroll dark zone, show normally when scrolled back up
  const frmFade = jumpscaresDone
    ? (endP < 0.05 ? 1 : Math.max(0,1-(endP-0.05)/0.35))
    : (endP<0.4?1:Math.max(0,1-(endP-0.4)/0.35));
  dotsEl.style.opacity      = uiFade;
  capEl.style.opacity       = uiFade;
  phaseLbl.style.opacity    = uiFade;
  frameBorder.style.opacity = frmFade;

  const wantShow = layer9Showing ? (endP>HIDE_9) : (endP>SHOW_9);
  if(wantShow && !layer9Showing){
    const firstVisit=!layer9EverShown;
    layer9EverShown=true;
    openLayer9(firstVisit);
  } else if(!wantShow && layer9Showing){
    closeLayer9();
  }
}

window.addEventListener('scroll',onScroll,{passive:true});
onScroll();
</script>
</body>
</html>
